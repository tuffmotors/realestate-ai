<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Estate AI Lead Capture Assistant</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(16, 22, 43, 0.78);
      --panel-strong: #121a32;
      --card: rgba(21, 31, 58, 0.88);
      --text: #e9eefc;
      --muted: #9ca9c9;
      --accent: #5da8ff;
      --accent-2: #7d67ff;
      --success: #28d7a1;
      --danger: #ff5b7f;
      --border: rgba(255, 255, 255, 0.11);
      --shadow: 0 24px 50px rgba(0, 0, 0, 0.45);
      --radius-lg: 22px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(93, 168, 255, 0.2), transparent 38%),
        radial-gradient(circle at 85% 85%, rgba(125, 103, 255, 0.22), transparent 36%),
        linear-gradient(155deg, #070b16 0%, #0b1020 45%, #0a0f1f 100%);
      color: var(--text);
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 36px 20px 44px;
      display: grid;
      gap: 24px;
      grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .chat-widget {
      position: sticky;
      top: 24px;
      display: flex;
      flex-direction: column;
      min-height: 690px;
      max-height: calc(100vh - 56px);
    }

    .chat-header {
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0));
    }

    .brand {
      font-size: 1.02rem;
      font-weight: 650;
      letter-spacing: 0.2px;
      margin: 0;
    }

    .status {
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(40, 215, 161, 0.16);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.72; }
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 88%;
      border-radius: 14px;
      padding: 11px 13px;
      line-height: 1.45;
      font-size: 0.95rem;
      opacity: 0;
      transform: translateY(6px);
      animation: fadeInUp 0.35s ease forwards;
      border: 1px solid transparent;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.bot {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(93, 168, 255, 0.95), rgba(125, 103, 255, 0.95));
      color: white;
      box-shadow: 0 14px 24px rgba(53, 87, 177, 0.36);
    }

    .typing {
      align-self: flex-start;
      display: inline-flex;
      gap: 6px;
      padding: 10px 12px;
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #9db8ff;
      opacity: 0.4;
      animation: blink 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes blink {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40% { transform: translateY(-3px); opacity: 1; }
    }

    .chat-input-wrap {
      padding: 12px;
      border-top: 1px solid var(--border);
      background: rgba(8, 12, 25, 0.62);
      display: flex;
      gap: 9px;
    }

    .chat-input {
      flex: 1;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 13px;
      font-size: 0.94rem;
      outline: none;
      transition: 0.2s ease;
    }

    .chat-input:focus {
      border-color: rgba(93, 168, 255, 0.75);
      box-shadow: 0 0 0 4px rgba(93, 168, 255, 0.14);
    }

    .send-btn {
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border-radius: 12px;
      font-weight: 650;
      padding: 0 16px;
      font-size: 0.92rem;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .send-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .send-btn:active { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .admin-panel {
      padding: 18px;
      min-height: 690px;
    }

    .admin-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .admin-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 680;
    }

    .lead-count {
      font-size: 0.9rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 12px;
    }

    .notification {
      margin-bottom: 12px;
      background: linear-gradient(130deg, rgba(40, 215, 161, 0.2), rgba(28, 167, 208, 0.13));
      border: 1px solid rgba(40, 215, 161, 0.45);
      border-radius: 13px;
      padding: 10px 12px;
      font-size: 0.9rem;
      color: #cdfbe9;
      transform: translateY(-8px);
      opacity: 0;
      pointer-events: none;
      transition: 0.3s ease;
    }

    .notification.show {
      transform: translateY(0);
      opacity: 1;
    }

    .lead-list {
      display: grid;
      gap: 11px;
    }

    .lead-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 13px 14px;
      transform: translateY(8px);
      opacity: 0;
      animation: reveal 0.34s ease forwards;
    }

    @keyframes reveal {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .lead-card h4 {
      margin: 0 0 6px;
      font-size: 0.98rem;
      font-weight: 650;
    }

    .lead-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 0;
      font-size: 0.89rem;
    }

    .lead-row .k {
      color: var(--muted);
      flex-shrink: 0;
      min-width: 95px;
    }

    .lead-row .v {
      text-align: right;
      color: var(--text);
    }

    .empty {
      border: 1px dashed rgba(255, 255, 255, 0.18);
      border-radius: var(--radius-md);
      padding: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
      font-size: 0.92rem;
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
      }
      .chat-widget,
      .admin-panel {
        min-height: unset;
      }
      .chat-widget {
        position: relative;
        top: 0;
        max-height: unset;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel chat-widget" aria-label="Lead capture chat widget">
      <header class="chat-header">
        <h1 class="brand">Sarah Johnson - Premium Real Estate</h1>
        <div class="status">
          <span class="status-dot"></span>
          AI Assistant Online
        </div>
      </header>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-wrap">
        <input id="chatInput" class="chat-input" type="text" placeholder="Type your response..." autocomplete="off" />
        <button id="sendBtn" class="send-btn" type="button">Send</button>
      </div>
    </section>

    <section class="panel admin-panel" aria-label="Lead admin panel">
      <div class="admin-head">
        <h2 class="admin-title">Lead Capture Admin Panel</h2>
        <div id="leadCount" class="lead-count">0 leads captured</div>
      </div>
      <div id="notification" class="notification">New Lead Captured</div>
      <div id="leadList" class="lead-list">
        <div class="empty" id="emptyState">No leads yet. Complete the chat to capture your first lead.</div>
      </div>
    </section>
  </main>

  <script>
    const chatMessages = document.getElementById("chatMessages");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const leadList = document.getElementById("leadList");
    const leadCount = document.getElementById("leadCount");
    const notification = document.getElementById("notification");
    const emptyState = document.getElementById("emptyState");

    const conversationSteps = [
      {
        key: "goal",
        question: "Welcome! I am Sarah's assistant. Are you currently looking to buy or rent?"
      },
      {
        key: "budget",
        question: "Perfect, thank you. What budget range are you aiming for?"
      },
      {
        key: "area",
        question: "Great. Which area or neighborhood are you most interested in?"
      },
      {
        key: "timeline",
        question: "Excellent choice. What timeline are you hoping for?"
      },
      {
        key: "name",
        question: "To personalize your options, may I have your full name?"
      },
      {
        key: "phone",
        question: "Thanks! What is the best phone number to reach you?"
      }
    ];

    let currentStepIndex = 0;
    let leadInProgress = {};
    const leads = [];
    let busy = false;

    function addMessage(text, sender) {
      const bubble = document.createElement("div");
      bubble.className = `msg ${sender}`;
      bubble.textContent = text;
      chatMessages.appendChild(bubble);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addTypingIndicator() {
      const typing = document.createElement("div");
      typing.className = "typing";
      typing.id = "typing";
      typing.innerHTML = "<span></span><span></span><span></span>";
      chatMessages.appendChild(typing);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTypingIndicator() {
      const typing = document.getElementById("typing");
      if (typing) typing.remove();
    }

    function askCurrentQuestion() {
      if (currentStepIndex >= conversationSteps.length) return;
      busy = true;
      sendBtn.disabled = true;
      addTypingIndicator();
      setTimeout(() => {
        removeTypingIndicator();
        addMessage(conversationSteps[currentStepIndex].question, "bot");
        busy = false;
        sendBtn.disabled = false;
        chatInput.focus();
      }, 700);
    }

    function safeValue(value) {
      return (value || "Not provided").toString().trim();
    }

    function validateStepInput(stepKey, input) {
      const value = input.trim();
      const normalized = value.toLowerCase();

      if (stepKey === "goal") {
        if (normalized === "buy" || normalized === "rent") {
          return { valid: true, value: normalized };
        }
        return {
          valid: false,
          error: "Please type either 'buy' or 'rent' to continue"
        };
      }

      if (stepKey === "budget") {
        const budgetPattern = /^(?=.*\d)[\$\s\d,.\-kKmMm+toTO]+$/;
        if (budgetPattern.test(value)) {
          return { valid: true, value };
        }
        return {
          valid: false,
          error: "Please enter a valid budget amount e.g. $500,000 or $500k-$800k"
        };
      }

      if (stepKey === "area") {
        if (value.length >= 3) {
          return { valid: true, value };
        }
        return {
          valid: false,
          error: "Please enter a suburb or area name"
        };
      }

      if (stepKey === "timeline") {
        const timelinePattern = /\b(day|days|week|weeks|month|months|year|years)\b/i;
        if (timelinePattern.test(value)) {
          return { valid: true, value };
        }
        return {
          valid: false,
          error: "Please enter a timeline e.g. 3 months or 1 year"
        };
      }

      if (stepKey === "name") {
        const namePattern = /^[A-Za-z]+(?:[ '-][A-Za-z]+)+$/;
        if (namePattern.test(value)) {
          return { valid: true, value };
        }
        return {
          valid: false,
          error: "Please enter your full name"
        };
      }

      if (stepKey === "phone") {
        const digitsOnly = value.replace(/\D/g, "");
        const phonePattern = /^[+\d()\-\s.]+$/;
        if (phonePattern.test(value) && digitsOnly.length >= 8) {
          return { valid: true, value };
        }
        return {
          valid: false,
          error: "Please enter a valid phone number"
        };
      }

      return { valid: true, value };
    }

    function showNotification() {
      notification.classList.add("show");
      setTimeout(() => notification.classList.remove("show"), 2200);
    }

    function updateLeadCount() {
      const count = leads.length;
      leadCount.textContent = `${count} lead${count === 1 ? "" : "s"} captured`;
    }

    function renderLead(lead) {
      if (emptyState && emptyState.parentElement) {
        emptyState.remove();
      }

      const card = document.createElement("article");
      card.className = "lead-card";
      card.innerHTML = `
        <h4>${safeValue(lead.name)}</h4>
        <div class="lead-row"><span class="k">Intent</span><span class="v">${safeValue(lead.goal)}</span></div>
        <div class="lead-row"><span class="k">Budget</span><span class="v">${safeValue(lead.budget)}</span></div>
        <div class="lead-row"><span class="k">Area</span><span class="v">${safeValue(lead.area)}</span></div>
        <div class="lead-row"><span class="k">Timeline</span><span class="v">${safeValue(lead.timeline)}</span></div>
        <div class="lead-row"><span class="k">Phone</span><span class="v">${safeValue(lead.phone)}</span></div>
      `;
      leadList.prepend(card);
    }

    function completeLeadCapture() {
      const completedLead = { ...leadInProgress };
      leads.push(completedLead);
      updateLeadCount();
      renderLead(completedLead);
      showNotification();

      addMessage(
        "Thank you, " +
          safeValue(completedLead.name) +
          ". I have shared your details with Sarah. Sarah will call you within 1 hour.",
        "bot"
      );
      addMessage(
        "If you would like, I can help capture another enquiry right away. Just tell me: buy or rent?",
        "bot"
      );

      leadInProgress = {};
      currentStepIndex = 0;
    }

    function handleUserInput() {
      if (busy) return;
      const text = chatInput.value.trim();
      if (!text) return;

      addMessage(text, "user");
      chatInput.value = "";

      const step = conversationSteps[currentStepIndex];
      const validation = validateStepInput(step.key, text);
      if (!validation.valid) {
        addMessage(validation.error, "bot");
        chatInput.focus();
        return;
      }

      leadInProgress[step.key] = validation.value;
      currentStepIndex += 1;

      if (currentStepIndex < conversationSteps.length) {
        askCurrentQuestion();
      } else {
        busy = true;
        sendBtn.disabled = true;
        addTypingIndicator();
        setTimeout(() => {
          removeTypingIndicator();
          completeLeadCapture();
          busy = false;
          sendBtn.disabled = false;
          chatInput.focus();
        }, 900);
      }
    }

    sendBtn.addEventListener("click", handleUserInput);
    chatInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        handleUserInput();
      }
    });

    // Warm opening script
    addMessage(
      "Hi there, and welcome! I would love to help you find the perfect property today.",
      "bot"
    );
    setTimeout(askCurrentQuestion, 600);
  </script>
</body>
</html>
